{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nueva contraseña | Wind</title>
    <link rel="stylesheet" href="{% static 'wind/css/app.css' %}" />
  </head>
  <body class="app-body">
    <div class="app-wrap">
      <div class="app-card">
        <header class="app-header">
          <div class="app-brand">
            <div class="app-logo" aria-hidden="true"></div>
            <div>
              <h1>Nueva contraseña</h1>
              <p>Elige una contraseña segura</p>
            </div>
          </div>
        </header>

        <div class="app-content">
          <div id="alert" class="app-alert" role="alert"></div>

          {% if error %}
          <div class="app-panel">
            <p class="app-alert show error" style="display: block">{{ error }}</p>
            <p style="text-align: center; margin: 16px 0 0">
              <a class="app-link" href="{% url 'forgot_password' %}">Solicitar nuevo enlace</a>
              ·
              <a class="app-link" href="{% url 'login' %}">Iniciar sesión</a>
            </p>
          </div>
          {% else %}
          <form id="reset-form" class="app-form app-panel">
            <input type="hidden" id="token" value="{{ token }}" />
            <div class="app-field">
              <label for="newPass">Nueva contraseña</label>
              <input
                id="newPass"
                name="newPass"
                type="password"
                autocomplete="new-password"
                minlength="8"
                required
              />
            </div>
            <div class="app-field">
              <label for="confirmPass">Confirmar contraseña</label>
              <input
                id="confirmPass"
                name="confirmPass"
                type="password"
                autocomplete="new-password"
                minlength="8"
                required
              />
            </div>
            <button type="submit" class="app-btn primary" id="btn-submit">Guardar contraseña</button>
            <p style="text-align: center; margin: 12px 0 0">
              <a class="app-link" href="{% url 'login' %}">Volver al inicio de sesión</a>
            </p>
          </form>
          {% endif %}
        </div>
      </div>
    </div>

    {% if not error %}
    <script>
      const alertEl = document.getElementById("alert");

      function showAlert(message, type) {
        alertEl.textContent = message;
        alertEl.className = "app-alert show " + (type || "error");
      }

      function clearAlert() {
        alertEl.className = "app-alert";
        alertEl.textContent = "";
      }

      document.getElementById("reset-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        clearAlert();
        const btn = document.getElementById("btn-submit");
        btn.disabled = true;

        const token = document.getElementById("token").value;
        const newPass = document.getElementById("newPass").value;
        const confirmPass = document.getElementById("confirmPass").value;

        if (newPass !== confirmPass) {
          showAlert("Las contraseñas no coinciden.", "error");
          btn.disabled = false;
          return;
        }

        if (newPass.length < 8) {
          showAlert("La contraseña debe tener al menos 8 caracteres.", "error");
          btn.disabled = false;
          return;
        }

        try {
          const res = await fetch("/api/auth/password/reset-confirm/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, newPass, confirmPass }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            const msg =
              data.errors?.confirmPass?.[0] ||
              data.errors?.newPass?.[0] ||
              data.message ||
              "No se pudo actualizar la contraseña.";
            throw new Error(msg);
          }

          showAlert(data.message || "Contraseña actualizada correctamente.", "success");
          document.getElementById("reset-form").hidden = true;
          setTimeout(() => {
            window.location.href = "{% url 'login' %}";
          }, 2000);
        } catch (err) {
          showAlert(err.message || "Error al guardar la contraseña.", "error");
          btn.disabled = false;
        }
      });
    </script>
    {% endif %}
  </body>
</html>
