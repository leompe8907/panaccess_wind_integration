# Bootstrap HTTP — usar SOLO mientras no existan los certificados en /etc/nginx/.
# backend.wind.do | sin ssl_certificate
#
# 1. sudo cp deploy/nginx/panaccess-wind-bootstrap-http.conf /etc/nginx/sites-available/panaccess-wind.conf
# 2. sudo nginx -t && sudo systemctl reload nginx
# 3. Copiar certificados: /etc/nginx/cdn1.wind.do.crt y /etc/nginx/cdn1.wind.do.key
# 4. sudo cp deploy/nginx/panaccess-wind-scaled.conf /etc/nginx/sites-available/panaccess-wind.conf
# 5. sudo nginx -t && sudo systemctl reload nginx

upstream django_backend {
    server 127.0.0.1:8000 fail_timeout=0;
    server 127.0.0.1:8001 fail_timeout=0;
    server 127.0.0.1:8002 fail_timeout=0;
    server 127.0.0.1:8003 fail_timeout=0;
    server 127.0.0.1:8004 fail_timeout=0;
    server 127.0.0.1:8005 fail_timeout=0;
    server 127.0.0.1:8006 fail_timeout=0;
    server 127.0.0.1:8007 fail_timeout=0;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name backend.wind.do;

    location = /health/ {
        access_log off;
        proxy_set_header Host $host;
        proxy_pass http://django_backend;
    }

    location /ws/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://django_backend;
    }
}
