# Nginx — perfil escalado (8 instancias Daphne, puertos 8000-8007)
# Producción Wind: backend.wind.do | 32 GB RAM / 16 cores
#
# Verificar certificados antes de nginx -t:
#   sudo ls /etc/letsencrypt/live/backend.wind.do/
# Si no existen: sudo certbot --nginx -d backend.wind.do
## Requisitos:
#   sudo cp deploy/systemd/panaccess-wind@.service /etc/systemd/system/
#   DAPHNE_INSTANCES=8 sudo deploy/manage_daphne.sh enable
#   DAPHNE_INSTANCES=8 sudo deploy/manage_daphne.sh start
#   NO uses panaccess-wind.service (instancia única) a la vez.

limit_req_zone $binary_remote_addr zone=win_register:10m rate=5r/m;

upstream django_backend {
    server 127.0.0.1:8000 fail_timeout=0;
    server 127.0.0.1:8001 fail_timeout=0;
    server 127.0.0.1:8002 fail_timeout=0;
    server 127.0.0.1:8003 fail_timeout=0;
    server 127.0.0.1:8004 fail_timeout=0;
    server 127.0.0.1:8005 fail_timeout=0;
    server 127.0.0.1:8006 fail_timeout=0;
    server 127.0.0.1:8007 fail_timeout=0;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name backend.wind.do;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name backend.wind.do;

    ssl_certificate     /etc/letsencrypt/live/backend.wind.do/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backend.wind.do/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    location ~ ^/wind/(sync-|compare-and-update|full-sync|singleton|ops/) {
        allow 127.0.0.1;
        deny all;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://django_backend;
    }

    location ^~ /admin/ {
        allow 127.0.0.1;
        deny all;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://django_backend;
    }

    location = /wind/create-subscriber/ {
        limit_req zone=win_register burst=5 nodelay;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://django_backend;
    }

    location = /health/ {
        access_log off;
        proxy_set_header Host $host;
        proxy_pass http://django_backend;
    }

    location = /ready/ {
        access_log off;
        proxy_set_header Host $host;
        proxy_pass http://django_backend;
    }

    location /ws/ {
        proxy_pass http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /static/ {
        alias /opt/panaccess-wind/staticfiles/;
    }

    location /media/ {
        alias /opt/panaccess-wind/mediafiles/;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_pass http://django_backend;
    }
}
